<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M|Leads Performance Sumatera</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --surface2: #e8edf3;
            --border: #c8d6e5;
            --accent: #0077aa;
            --accent2: #6d28d9;
            --accent3: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --text: #1a2d44;
            --text-dim: #5a7a96;
            --glow: 0 0 20px rgba(0,119,170,0.12);
            --grid-line: rgba(0,119,170,0.04);
            --font-mono: 'Share Tech Mono', monospace;
            --font-main: 'Exo 2', sans-serif;
        }

        body.dark-mode {
            --bg: #060b14;
            --surface: #0d1520;
            --surface2: #111d2e;
            --border: #1a2d44;
            --accent: #00e5ff;
            --accent2: #7c3aed;
            --accent3: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #e0eaf5;
            --text-dim: #5a7a96;
            --glow: 0 0 20px rgba(0,229,255,0.15);
            --grid-line: rgba(0,229,255,0.03);
        }

        /* THEME TOGGLE */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }
        .theme-toggle-label {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .toggle-track {
            width: 44px;
            height: 24px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            position: relative;
            transition: background 0.3s, border-color 0.3s;
        }
        body.dark-mode .toggle-track {
            background: rgba(0,229,255,0.12);
            border-color: var(--accent);
        }
        .toggle-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--text-dim);
            transition: transform 0.3s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            line-height: 1;
        }
        body.dark-mode .toggle-thumb {
            transform: translateX(20px);
            background: var(--accent);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.4s, color 0.4s;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 97%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* HEADER */
        .header-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 18px 24px;
            border-radius: 10px;
            border: 1px solid var(--accent);
            background: linear-gradient(135deg, rgba(0,119,170,0.06), rgba(109,40,217,0.06));
            box-shadow: var(--glow), inset 0 0 40px rgba(0,119,170,0.03);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            transition: background 0.4s, box-shadow 0.4s;
        }
        body.dark-mode .header-banner {
            background: linear-gradient(135deg, rgba(0,229,255,0.05), rgba(124,58,237,0.05));
            box-shadow: var(--glow), inset 0 0 40px rgba(0,229,255,0.03);
        }

        .header-banner::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .header-left h2 {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0,119,170,0.2);
            transition: color 0.4s, text-shadow 0.4s;
        }
        body.dark-mode .header-left h2 {
            text-shadow: 0 0 20px rgba(0,229,255,0.4);
        }
        .header-left h2 span { color: var(--text-dim); }

        .as-of-text {
            display: block;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .header-pulse {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--accent3);
        }

        .pulse-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent3);
            box-shadow: 0 0 10px var(--accent3);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* STATS */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .stat-card:hover { border-color: var(--accent); box-shadow: var(--glow); }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
        }
        .stat-card.cyan::before   { background: var(--accent); }
        .stat-card.violet::before { background: var(--accent2); }
        .stat-card.green::before  { background: var(--accent3); }
        .stat-card.red::before    { background: var(--danger); }

        .stat-label {
            font-size: 10px;
            font-family: var(--font-mono);
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: 900;
            line-height: 1;
            color: var(--text);
        }
        .stat-card.cyan .stat-value  { color: var(--accent); text-shadow: 0 0 15px rgba(0,119,170,0.15); }
        .stat-card.red .stat-value   { color: var(--danger); text-shadow: 0 0 15px rgba(220,38,38,0.15); }
        body.dark-mode .stat-card.cyan .stat-value { text-shadow: 0 0 15px rgba(0,229,255,0.3); }
        body.dark-mode .stat-card.red  .stat-value { text-shadow: 0 0 15px rgba(239,68,68,0.3); }

        /* FILTERS */
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 16px;
            background: var(--surface);
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        input, select {
            padding: 9px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--font-main);
            font-size: 13px;
            flex: 1;
            min-width: 140px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0,119,170,0.12);
        }
        input::placeholder { color: var(--text-dim); }
        select option { background: var(--surface); color: var(--text); }
        #periodeFilter { border-color: var(--accent); color: var(--accent); font-weight: 600; }

        /* BUTTONS */
        .button-group-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .button-group-row .btn { flex: 1; justify-content: center; }

        .btn {
            padding: 9px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ffffff;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .reset-btn  { background: var(--accent3); }
        .print-btn  { background: var(--accent2); color: white; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .btn:active { transform: translateY(0); }

        /* CHART */
        #chartWrapper {
            display: none;
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid var(--accent);
            border-radius: 10px;
            background: var(--surface);
            box-shadow: var(--glow);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        #chartTitle {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .close-chart-btn {
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-dim);
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.2s;
        }
        .close-chart-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* TABLE */
        .table-container {
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: auto;
            max-height: 600px;
            background: var(--surface);
        }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        thead tr { position: sticky; top: 0; z-index: 5; }

        th {
            background: var(--surface2);
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 12px 14px;
            border-bottom: 2px solid var(--accent);
            border-right: 1px solid var(--border);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        th:last-child { border-right: none; }
        th:hover { background: rgba(0,119,170,0.08); }

        th .sort-icon { margin-left: 4px; font-size: 10px; opacity: 0.35; }
        th.sort-asc  .sort-icon::after { content: '▲'; opacity: 1; color: var(--accent); }
        th.sort-desc .sort-icon::after { content: '▼'; opacity: 1; color: var(--accent); }
        th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content: '⇅'; }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        tbody tr:hover { background: rgba(0,119,170,0.04); }

        td {
            padding: 8px 14px;
            border-right: 1px solid var(--border);
            color: var(--text);
            font-size: 12px;
            vertical-align: middle;
        }
        td:last-child { border-right: none; }

        .highlight-red { color: var(--danger); font-weight: 700; }
        .highlight-yes { color: var(--accent3); font-weight: 700; }

        .clickable-name {
            color: var(--accent);
            font-weight: 700;
            cursor: pointer;
            transition: text-shadow 0.2s;
        }
        .clickable-name:hover { text-shadow: 0 0 10px rgba(0,119,170,0.4); }

        /* SPARKLINE */
        .sparkline-cell {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .spark-val {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            min-width: 22px;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* MOBILE */
        @media screen and (max-width: 768px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
            .stat-value { font-size: 20px; }
            .header-pulse { display: none; }

            .filter-container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            #searchBox { grid-column: span 2; }

            .button-group-row {
                grid-column: span 2;
                display: grid;
                grid-template-columns: 1fr 1fr;
            }
            .btn { width: 100%; justify-content: center; padding: 11px 4px; font-size: 10px; }

            table thead { display: none; }
            table, tbody, tr, td { display: block; width: 100%; }

            tr {
                margin-bottom: 12px;
                border: 1px solid var(--border);
                border-radius: 8px;
                background: var(--surface);
                overflow: hidden;
            }
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                text-align: right;
                padding: 8px 12px;
                border: none;
                border-bottom: 1px solid rgba(200,214,229,0.8);
                word-break: break-word;
                border-right: none;
            }
            td::before {
                content: attr(data-label);
                flex: 0 0 45%;
                text-align: left;
                font-weight: 600;
                font-family: var(--font-mono);
                font-size: 10px;
                color: var(--text-dim);
                letter-spacing: 0.5px;
            }
            td:last-child { border-bottom: none; }
            .sparkline-cell { justify-content: flex-end; }
        }
    </style>
</head>
<body oncontextmenu="return false;">
<div class="container">

    <div class="header-banner">
        <div class="header-left">
            <h2>M|LEADS PERFORMANCE <span>//Region Sumatera</span></h2>
            <span id="asOfDisplay" class="as-of-text">LOADING DATA...</span>
        </div>
        <div class="header-pulse">
            <div class="pulse-dot"></div>
            LIVE DASHBOARD
        </div>
        <div class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
            <span class="theme-toggle-label" id="themeLabel">☀ Light</span>
            <div class="toggle-track">
                <div class="toggle-thumb"></div>
            </div>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card cyan">
            <div class="stat-label">Total Sales Team</div>
            <div class="stat-value" id="statTotal">—</div>
        </div>
        <div class="stat-card green">
            <div class="stat-label">Jumlah Leads</div>
            <div class="stat-value" id="statLogin">—</div>
        </div>
        <div class="stat-card red">
            <div class="stat-label">Jumlah Leads Follow Up</div>
            <div class="stat-value" id="statNotLogin">—</div>
        </div>
        <div class="stat-card violet">
            <div class="stat-label">Leads Follow Up Rate</div>
            <div class="stat-value" id="statRate">—</div>
        </div>
    </div>

    <div class="filter-container">
        <input type="text" id="searchBox" placeholder="⌕ Search name or code..." onkeyup="filterAndSearchTable()">
        <select id="periodeFilter" onchange="filterAndSearchTable()"><option value="">All Period</option></select>
        <select id="positionFilter" onchange="filterAndSearchTable()"><option value="">All Position</option></select>
        <select id="branchFilter"   onchange="filterAndSearchTable()"><option value="">All Branch</option></select>
<!--
        <select id="zeroMTDFilter"  onchange="filterAndSearchTable()">
            <option value="">Login MTD (All)</option>
            <option value="0">NOT Login MTD</option>
        </select>
-->
        <div class="button-group-row">
            <button class="btn reset-btn"  onclick="resetFilter()">↺ Reset</button>
<!--
            <button class="btn print-btn"  onclick="printTable()">⎙ Print</button>
-->
        </div>
    </div>

    <div id="chartWrapper">
        <div class="chart-header">
            <h4 id="chartTitle">M|Leads Performance Detail</h4>
            <button class="close-chart-btn" onclick="closeChart()">✕ Close</button>
        </div>
        <div style="height:320px;"><canvas id="performanceChart"></canvas></div>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let tableData = [];
    let myChart = null;
    let headers = [];
    let currentSort = { col: -1, dir: 'asc' };

    /* ── THEME TOGGLE ── */
    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark-mode');
        document.getElementById('themeLabel').textContent = isDark ? '☽ Dark' : '☀ Light';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        // Update chart defaults live
        const gridColor  = isDark ? '#1a2d44' : '#c8d6e5';
        const tickColor  = '#5a7a96';
        Chart.defaults.borderColor = gridColor;
        if (myChart) {
            myChart.options.scales.x.grid.color = gridColor;
            myChart.options.scales.y.grid.color = gridColor;
            myChart.options.scales.x.ticks.color = tickColor;
            myChart.options.scales.y.ticks.color = tickColor;
            myChart.options.plugins.datalabels.color = isDark ? '#e0eaf5' : '#1a2d44';
            myChart.data.datasets[0].backgroundColor = isDark ? 'rgba(0,229,255,0.25)' : 'rgba(0,119,170,0.18)';
            myChart.data.datasets[0].borderColor      = isDark ? '#00e5ff' : '#0077aa';
            myChart.data.datasets[1].backgroundColor = isDark ? 'rgba(16,185,129,0.25)' : 'rgba(5,150,105,0.18)';
            myChart.data.datasets[1].borderColor      = isDark ? '#10b981' : '#059669';
            myChart.update();
        }
    }

    // Apply saved theme on load
    (function() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeLabel').textContent = '☽ Dark';
        }
    })();

    Chart.defaults.color = '#5a7a96';
    Chart.defaults.borderColor = '#c8d6e5';

    fetch('leads.json')
        .then(r => r.json())
        .then(data => { tableData = data; populateTable(data); })
        .catch(err => {
            console.error(err);
            document.getElementById('asOfDisplay').textContent = 'ERROR LOADING DATASET.JSON';
        });

    /* ── 1. ANIMATED COUNTER ── */
    function animateCounter(el, targetVal, suffix) {
        const end = parseFloat(targetVal);
        if (isNaN(end)) { el.textContent = targetVal; return; }
        const from = parseFloat(el.textContent) || 0;
        const duration = 550;
        const start = performance.now();
        (function step(now) {
            const t = Math.min((now - start) / duration, 1);
            const ease = 1 - Math.pow(1 - t, 3);
            el.textContent = Math.round(from + (end - from) * ease) + (suffix || '');
            if (t < 1) requestAnimationFrame(step);
        })(start);
    }

    function updateStats(total, login, notLogin) {
        animateCounter(document.getElementById('statTotal'),    total,    '');
        animateCounter(document.getElementById('statLogin'),    login,    '');
        animateCounter(document.getElementById('statNotLogin'), notLogin, '');
        const rate = total > 0 ? Math.round((login / total) * 100) : null;
        if (rate !== null) animateCounter(document.getElementById('statRate'), rate, '%');
        else document.getElementById('statRate').textContent = '—';
    }

    /* ── 2. SPARKLINE (canvas, color-graded bars) ── */
    function drawSparkline(canvas, values) {
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);
        if (!values || values.length === 0) return;
        const max = Math.max(...values, 1);
        const gap = 2;
        const barW = Math.max(1, Math.floor((W - gap * (values.length - 1)) / values.length));
        values.forEach((v, i) => {
            const ratio = v / max;
            const barH = Math.max(2, Math.round(ratio * (H - 2)));
            const x = i * (barW + gap);
            const y = H - barH;
            // red → amber → green gradient
            let r, g, b;
            if (ratio < 0.5) {
                r = 239; g = Math.round(68 + ratio * 2 * 91); b = 68;
            } else {
                r = Math.round(239 - (ratio - 0.5) * 2 * 223);
                g = Math.round(159 + (ratio - 0.5) * 2 * 26);
                b = Math.round(68  + (ratio - 0.5) * 2 * 61);
            }
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(x, y, barW, barH);
        });
    }

    function getSparkValues(row) {
        return headers
            .map(h => parseFloat(row[h]))
            .filter(v => !isNaN(v) && v > 0)
            .slice(0, 7);
    }

    /* ── POPULATE TABLE ── */
    function populateTable(data) {
        const tableHead    = document.getElementById('tableHead');
        const tableBody    = document.getElementById('tableBody');
        const branchFilter = document.getElementById('branchFilter');
        const periodeFilter= document.getElementById('periodeFilter');
        const posFilter    = document.getElementById('positionFilter');

        tableBody.innerHTML = '';
        let branches = new Set(), periods = new Set(), positions = new Set();

        if (!data.length) return;
        headers = Object.keys(data[0]);

        /* Build sortable header */
        tableHead.innerHTML = '';
        headers.forEach((h, i) => {
            const th = document.createElement('th');
            th.innerHTML = `${h}<span class="sort-icon"></span>`;
            th.onclick = () => sortTable(i);
            tableHead.appendChild(th);
        });
        // Sparkline column
        const thSpark = document.createElement('th');
        thSpark.innerHTML = 'Spark<span class="sort-icon"></span>';
        thSpark.title = 'Mini activity chart';
        tableHead.appendChild(thSpark);

        data.forEach(row => {
            const tr = document.createElement('tr');
            headers.forEach((header, index) => {
                const td  = document.createElement('td');
                const val = (row[header] == null) ? "" : row[header];
                td.textContent = val;
                td.setAttribute('data-label', header);

                if (index === 2) {
                    td.classList.add('clickable-name');
                    td.onclick = () => showChart(row);
                }
                if (header.toLowerCase().includes("mtd") && (val === "0" || val === 0)) td.classList.add("highlight-red");
                if (header.toLowerCase().includes("dtd") && val === "Y") td.classList.add("highlight-yes");
                if (header.toLowerCase().includes("dtd") && val === "N") td.classList.add("highlight-red");
                tr.appendChild(td);
            });

            /* Sparkline cell */
            const sparkVals = getSparkValues(row);
            const tdSpark = document.createElement('td');
            tdSpark.setAttribute('data-label', 'Spark');
            const div = document.createElement('div');
            div.className = 'sparkline-cell';
            const cvs = document.createElement('canvas');
            cvs.width = 60; cvs.height = 22;
            cvs.dataset.vals = JSON.stringify(sparkVals);
            const valSpan = document.createElement('span');
            valSpan.className = 'spark-val';
            valSpan.textContent = sparkVals.length ? Math.max(...sparkVals) : '—';
            div.appendChild(cvs);
            div.appendChild(valSpan);
            tdSpark.appendChild(div);
            tr.appendChild(tdSpark);

            tableBody.appendChild(tr);

            if (row['Branch'])  branches.add(row['Branch'].toString().trim());
            if (row['Period'])  periods.add(row['Period'].toString().trim());
            const posCol = headers[3];
            if (row[posCol]) positions.add(row[posCol].toString().trim());
        });

        fillSelect(branchFilter, branches, 'All Branch', false);
        const parsePeriod = s => { const d = new Date(s); return isNaN(d) ? new Date(s.split(" ").reverse().join(" ")) : d; };
        const sortedPeriods = Array.from(periods).sort((a,b) => parsePeriod(b) - parsePeriod(a));
        fillSelect(periodeFilter, sortedPeriods, 'All Period', true);
        if (sortedPeriods.length) periodeFilter.value = sortedPeriods[0];

        fillPositionSelect(posFilter, positions);
        filterAndSearchTable();
    }

    function renderVisibleSparklines() {
        document.querySelectorAll('#tableBody tr').forEach(tr => {
            if (tr.style.display === 'none') return;
            const cvs = tr.querySelector('canvas');
            if (!cvs) return;
            try { drawSparkline(cvs, JSON.parse(cvs.dataset.vals || '[]')); } catch(e) {}
        });
    }

    /* ── FILTER ── */
    function filterAndSearchTable() {
        const fPer    = document.getElementById('periodeFilter').value;
        const sBox    = document.getElementById('searchBox').value.toLowerCase();
        const fPos    = document.getElementById('positionFilter').value;
        const fBranch = document.getElementById('branchFilter').value;
        const fMTD    = document.getElementById('zeroMTDFilter').value;

        document.getElementById('asOfDisplay').textContent =
            fPer ? `AS OF PERIOD // ${fPer}` : 'ALL PERIODS';

        let total = 0, login = 0, notLogin = 0;

        document.querySelectorAll('#tableBody tr').forEach(row => {
            const c = row.cells;
            if (!c || !c.length) return;

            const matchSearch = c[2].textContent.toLowerCase().includes(sBox) ||
                                c[1].textContent.toLowerCase().includes(sBox);
            const matchBranch = !fBranch || c[4].textContent.trim() === fBranch;
            const matchPer    = !fPer    || c[0].textContent.trim() === fPer;
            const valMTD      = c[5].textContent.trim();
            const matchMTD    = !fMTD   || valMTD === fMTD;
            let   matchPos    = true;
            if      (fPos === "RM_ALL") matchPos = c[3].textContent.startsWith("RM");
            else if (fPos === "CS_ALL") matchPos = c[3].textContent.startsWith("CS");
            else if (fPos !== "")       matchPos = c[3].textContent.trim() === fPos;

            const visible = matchSearch && matchPos && matchBranch && matchPer && matchMTD;
            row.style.display = visible ? '' : 'none';

            if (visible) {
                total++;
                (valMTD === "0" || valMTD === 0) ? notLogin++ : login++;
            }
        });

        updateStats(total, login, notLogin);
        renderVisibleSparklines();
    }

    /* ── 3. COLUMN SORT ── */
    function sortTable(colIndex) {
        const tbody = document.getElementById('tableBody');
        const rows  = Array.from(tbody.querySelectorAll('tr'));
        const ths   = document.querySelectorAll('#tableHead th');

        if (currentSort.col === colIndex) {
            currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort.col = colIndex;
            currentSort.dir = 'asc';
        }

        ths.forEach((th, i) => {
            th.classList.remove('sort-asc', 'sort-desc');
            if (i === colIndex) th.classList.add(currentSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
        });

        rows.sort((a, b) => {
            const ca = a.cells[colIndex]?.textContent.trim() || '';
            const cb = b.cells[colIndex]?.textContent.trim() || '';
            const na = parseFloat(ca), nb = parseFloat(cb);
            const cmp = (!isNaN(na) && !isNaN(nb))
                ? na - nb
                : ca.localeCompare(cb, undefined, { numeric: true });
            return currentSort.dir === 'asc' ? cmp : -cmp;
        });

        rows.forEach(r => tbody.appendChild(r));
        renderVisibleSparklines();
    }


    /* ── HELPERS ── */
    function fillSelect(el, dataArray, label, isSortedArray) {
        el.innerHTML = `<option value="">${label}</option>`;
        const arr = isSortedArray ? dataArray : Array.from(dataArray).sort();
        arr.forEach(v => {
            const o = document.createElement('option');
            o.value = v; o.textContent = v;
            el.appendChild(o);
        });
    }

    function fillPositionSelect(el, set) {
        el.innerHTML = '<option value="">All Position</option><option value="RM_ALL">RM (All Group)</option><option value="CS_ALL">CS (All Group)</option>';
        Array.from(set).sort().forEach(v => {
            const o = document.createElement('option');
            o.value = v; o.textContent = v;
            el.appendChild(o);
        });
    }

    function resetFilter() {
        ['searchBox','positionFilter','branchFilter','zeroMTDFilter'].forEach(id =>
            document.getElementById(id).value = '');
        const pF = document.getElementById('periodeFilter');
        if (pF.options.length > 1) pF.value = pF.options[1].value;
        currentSort = { col: -1, dir: 'asc' };
        document.querySelectorAll('#tableHead th').forEach(th =>
            th.classList.remove('sort-asc','sort-desc'));
        filterAndSearchTable();
        closeChart();
    }

    function closeChart() { document.getElementById('chartWrapper').style.display = 'none'; }
    function printTable() { window.print(); }

    function showChart(rowData) {
        const wrapper = document.getElementById('chartWrapper');
        const ctx = document.getElementById('performanceChart').getContext('2d');
        wrapper.style.display = 'block';
        document.getElementById('chartTitle').innerText =
            'DETAIL // ' + (rowData['Marketing Name'] || 'USER').toUpperCase();
        if (myChart) myChart.destroy();

        const findVal = t => {
            const k = Object.keys(rowData).find(k => k.toLowerCase().includes(t.toLowerCase()));
            return k ? parseFloat(rowData[k].toString().replace(',','.')) || 0 : 0;
        };

        const isDark = document.body.classList.contains('dark-mode');
        const gridColor  = isDark ? '#1a2d44' : '#c8d6e5';
        const labelColor = isDark ? '#e0eaf5' : '#1a2d44';
        const callBg     = isDark ? 'rgba(0,229,255,0.25)'  : 'rgba(0,119,170,0.18)';
        const callBdr    = isDark ? '#00e5ff'  : '#0077aa';
        const visitBg    = isDark ? 'rgba(16,185,129,0.25)' : 'rgba(5,150,105,0.18)';
        const visitBdr   = isDark ? '#10b981'  : '#059669';

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Total MTD', 'Daily Average'],
                datasets: [
                    { label:'Calls',  data:[findVal('MTD Call'), findVal('AVG Call')],
                      backgroundColor: callBg, borderColor: callBdr, borderWidth:1.5, borderRadius:4 },
                    { label:'Visits', data:[findVal('MTD Visit'),findVal('AVG Visit')],
                      backgroundColor: visitBg, borderColor: visitBdr, borderWidth:1.5, borderRadius:4 }
                ]
            },
            options: {
                responsive:true, maintainAspectRatio:false,
                plugins: {
                    legend: { labels:{ color:'#5a7a96', font:{ family:"'Share Tech Mono',monospace", size:11 } } },
                    datalabels: { anchor:'end', align:'top', color: labelColor,
                        font:{ weight:'bold', family:"'Share Tech Mono',monospace", size:11 } }
                },
                scales: {
                    x: { grid:{color: gridColor}, ticks:{color:'#5a7a96', font:{family:"'Share Tech Mono',monospace"}} },
                    y: { grid:{color: gridColor}, ticks:{color:'#5a7a96', font:{family:"'Share Tech Mono',monospace"}} }
                }
            },
            plugins: [ChartDataLabels]
        });

        wrapper.scrollIntoView({ behavior:'smooth', block:'center' });
    }
</script>
</body>
